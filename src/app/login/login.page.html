<ion-content [fullscreen]="true" class="login-content" style="--background: transparent;">
  <div class="background-container"></div>
  <div class="page-wrapper">
    <div class="spacer"></div>

    <div class="bottom-overlay">
      <!-- Brand -->
      <div class="brand-section">
        <h1 class="logo-text">Eldemy</h1>
        <p class="tagline">Berdayakan<br />perjalanan belajarmu</p>
      </div>

      <!-- Form -->
      <div class="form-section">
        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <rect x="48" y="96" width="416" height="320" rx="40" ry="40"/>
            <polyline points="112 160 256 272 400 160"/>
          </svg>
          <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            class="glass-input"
          />
        </div>

        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M336 208v-95a80 80 0 00-160 0v95"/>
            <rect x="96" y="208" width="320" height="272" rx="48" ry="48"/>
            <path d="M256 368v-48" stroke-width="36"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Kata Sandi"
            [(ngModel)]="password"
            class="glass-input"
          />
          <svg class="input-icon-right-svg" (click)="togglePassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="!showPassword" cx="256" cy="256" r="80"/>
            <line *ngIf="showPassword" x1="432" y1="96" x2="80" y2="416"/>
            <path *ngIf="showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="showPassword" cx="256" cy="256" r="80"/>
          </svg>
        </div>

        <button class="btn-login" (click)="doLogin()">Masuk</button>
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">ATAU LANJUTKAN DENGAN</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social Buttons -->
      <div class="social-section">
        <button class="btn-social btn-google" (click)="loginWithGoogle()">
          <img src="assets/icon/google-icon.svg" alt="Google" class="social-icon" />
          <span>Google</span>
        </button>
      </div>

      <div class="bottom-link">
        <span class="muted-text">Baru di eldemy?</span>
        <span class="link-text" (click)="goToRegister()">Daftar</span>
      </div>
    </div>
  </div>

  <div class="nickname-overlay" *ngIf="showNicknameModal">
    <div class="nickname-modal">
      <div class="modal-icon">
        <ion-icon name="sparkles-outline"></ion-icon>
      </div>
      <h2>Selamat Datang di Eldemy! 🎉</h2>
      <p class="modal-subtitle">Kami ingin mengenal Anda lebih dekat. Apa nama panggilan Anda?</p>
      
      <div class="nickname-input-group">
        <ion-icon name="person-outline" class="input-ico"></ion-icon>
        <input 
          type="text" 
          [(ngModel)]="nicknameInput" 
          placeholder="Mis: Anto, Budi, Sari..." 
          class="nickname-input"
          maxlength="50"
          (keyup.enter)="saveNickname()"
        />
      </div>

      <button class="btn-save-nickname" (click)="saveNickname()" [disabled]="!nicknameInput.trim() || isSavingNickname">
        <span *ngIf="!isSavingNickname">Simpan & Lanjutkan</span>
        <ion-spinner name="crescent" *ngIf="isSavingNickname"></ion-spinner>
      </button>

      <button class="btn-skip" (click)="skipNickname()">Lewati untuk saat ini</button>
    </div>
  </div>
</ion-content>

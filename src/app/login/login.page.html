<ion-content [fullscreen]="true" class="login-content" style="--background: transparent;">
  <div class="background-container"></div>
  <div class="page-wrapper">
    <div class="spacer"></div>

    <div class="bottom-overlay">
      <!-- Brand -->
      <div class="brand-section">
        <h1 class="logo-text">Eldemy Sekolah</h1>
        <p class="tagline">Belajar lebih mudah,<br />bersama gurumu</p>
      </div>

      <!-- Form -->
      <div class="form-section">
        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M344 144c-3.92 52.87-44 96-88 96s-84.15-43.12-88-96c-4-55 35-96 88-96s92 42 88 96z"/>
            <path d="M256 304c-87 0-175.3 48-191.64 138.6C62.39 453.52 68.57 464 80 464h352c11.44 0 17.62-10.48 15.65-21.4C431.3 352 343 304 256 304z"/>
          </svg>
          <input
            type="text"
            inputmode="numeric"
            placeholder="NIS (Nomor Induk Siswa)"
            [(ngModel)]="nis"
            class="glass-input"
          />
        </div>

        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M336 208v-95a80 80 0 00-160 0v95"/>
            <rect x="96" y="208" width="320" height="272" rx="48" ry="48"/>
            <path d="M256 368v-48" stroke-width="36"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Kata Sandi"
            [(ngModel)]="password"
            class="glass-input"
            (keyup.enter)="doLogin()"
          />
          <svg class="input-icon-right-svg" (click)="togglePassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="!showPassword" cx="256" cy="256" r="80"/>
            <line *ngIf="showPassword" x1="432" y1="96" x2="80" y2="416"/>
            <path *ngIf="showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="showPassword" cx="256" cy="256" r="80"/>
          </svg>
        </div>

        <button class="btn-login" (click)="doLogin()" [disabled]="isLoading">
          <span *ngIf="!isLoading">Masuk</span>
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
        </button>

        <p class="hint-text">Kata sandi awal: tanggal lahirmu (contoh: 17052009)</p>
        <p class="hint-text umum-link" (click)="keUmum()">Bukan siswa? <b>Masuk sebagai pengguna umum</b></p>
      </div>
    </div>
  </div>
</ion-content>

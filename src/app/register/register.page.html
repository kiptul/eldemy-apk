<ion-content [fullscreen]="true" class="register-content" style="--background: transparent;">
  <div class="background-container"></div>
  <div class="page-wrapper">
    <div class="spacer"></div>

    <div class="bottom-overlay">
      <div class="form-section">
        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M344 144c-3.92 52.87-44 96-88 96s-84.15-43.12-88-96c-4-55 35-96 88-96s92 42 88 96z"/>
            <path d="M256 304c-87 0-175.3 48-191.64 138.6C62.39 453.52 68.57 464 80 464h352c11.44 0 17.62-10.48 15.65-21.4C431.3 352 343 304 256 304z"/>
          </svg>
          <input
            type="text"
            placeholder="Nama Pengguna"
            [(ngModel)]="username"
            class="glass-input"
          />
        </div>

        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <rect x="48" y="96" width="416" height="320" rx="40" ry="40"/>
            <polyline points="112 160 256 272 400 160"/>
          </svg>
          <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            class="glass-input"
          />
        </div>

        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M336 208v-95a80 80 0 00-160 0v95"/>
            <rect x="96" y="208" width="320" height="272" rx="48" ry="48"/>
            <path d="M256 368v-48" stroke-width="36"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Kata Sandi"
            [(ngModel)]="password"
            class="glass-input"
          />
          <svg class="input-icon-right-svg" (click)="togglePassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="!showPassword" cx="256" cy="256" r="80"/>
            <line *ngIf="showPassword" x1="432" y1="96" x2="80" y2="416"/>
            <path *ngIf="showPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="showPassword" cx="256" cy="256" r="80"/>
          </svg>
        </div>

        <div class="input-group">
          <svg class="input-icon-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path d="M256 48C141.31 48 48 141.31 48 256s93.31 208 208 208 208-93.31 208-208S370.69 48 256 48zm-42 310.24V153.76L346 256z"/>
            <path d="M256 48v128l90-64z" fill="currentColor" stroke="none"/>
            <path d="M336 208v-95a80 80 0 00-160 0v95"/>
            <rect x="128" y="208" width="256" height="224" rx="40" ry="40"/>
            <path d="M256 352v-48" stroke-width="36"/>
            <path d="M176 208V149a80 80 0 01160 0v59"/>
          </svg>
          <input
            [type]="showRepeatPassword ? 'text' : 'password'"
            placeholder="Ulangi Kata Sandi"
            [(ngModel)]="repeatPassword"
            class="glass-input"
          />
          <svg class="input-icon-right-svg" (click)="toggleRepeatPassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!showRepeatPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="!showRepeatPassword" cx="256" cy="256" r="80"/>
            <line *ngIf="showRepeatPassword" x1="432" y1="96" x2="80" y2="416"/>
            <path *ngIf="showRepeatPassword" d="M255.66 112c-77.94 0-157.89 45.11-220.83 135.33a16 16 0 00-.27 17.77C82.92 340.8 161.8 400 255.66 400c92.84 0 173.34-59.38 221.79-135.25a16.14 16.14 0 000-17.47C428.89 172.28 347.8 112 255.66 112z"/>
            <circle *ngIf="showRepeatPassword" cx="256" cy="256" r="80"/>
          </svg>
        </div>

        <button class="btn-register" (click)="doRegister()">Daftar</button>
      </div>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">ATAU LANJUTKAN DENGAN</span>
        <span class="divider-line"></span>
      </div>

      <div class="social-section">
        <button class="btn-social btn-google" (click)="registerWithGoogle()">
          <img src="assets/icon/google-icon.svg" alt="Google" class="social-icon" />
          <span>Google</span>
        </button>
      </div>

      <div class="bottom-link">
        <span class="muted-text">Sudah punya akun?</span>
        <span class="link-text" (click)="goToLogin()">Masuk</span>
      </div>
    </div>
  </div>
</ion-content>

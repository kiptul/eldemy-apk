<ion-content [fullscreen]="true" class="splash-content">
  <div class="splash-wrapper">
    <!-- Dot Grid Pattern Overlay -->
    <div class="dot-grid-pattern"></div>

    <!-- Animated Mesh Glow Spheres -->
    <div class="glow-orb orb-pink"></div>
    <div class="glow-orb orb-teal"></div>
    <div class="glow-orb orb-gold"></div>

    <div class="splash-container">
      <!-- Top Decorative Brand Tag -->
      <div class="top-tag-wrapper">
        <span class="top-tag"><span class="pulse-dot"></span> ELDEMY</span>
      </div>

      <!-- Main Glassmorphic Card -->
      <div class="main-card-wrapper">
        <div class="glass-card">
          <!-- Subtly styled inner border -->
          <div class="glass-card-inner">
            <img src="assets/images/Logo/logo apk.png" alt="Eldemy Logo" class="splash-logo" />
          </div>
        </div>
        <!-- Premium Multi-Color Aura behind the card -->
        <div class="card-glow-aurora"></div>
      </div>

      <!-- Brand Typography & Subtext -->
      <div class="brand-section">
        <h1 class="brand-title">ELDEMY</h1>
        <p class="brand-description">Belajar Tanpa Batas, Kapan Saja</p>
      </div>

      <!-- Interactive Linear Progress Bar -->
      <div class="loader-section">
        <div class="progress-bar-container">
          <div class="progress-bar-fill"></div>
        </div>
        <span class="loading-status">Menyiapkan ruang kelas...</span>
      </div>

      <!-- Footer Specs -->
      <div class="footer-specs">
        <span>Kursus Online &amp; Kelas Digital</span>
      </div>
    </div>
  </div>
</ion-content>
